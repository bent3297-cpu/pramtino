name: Build Promptino Bazaar and Myket APKs

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read shared market version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version_line="$(grep -E '^version:' pubspec.yaml | head -n 1 | sed -E 's/^version:[[:space:]]*//')"
          test -n "$version_line"
          [[ "$version_line" == *"+"* ]] || { echo "pubspec version must include a numeric build code, e.g. 2.4.15+50" >&2; exit 1; }
          build_name="${version_line%%+*}"
          build_number="${version_line##*+}"
          [[ "$build_number" =~ ^[1-9][0-9]*$ ]] || { echo "Invalid build number: $build_number" >&2; exit 1; }

          echo "build_name=$build_name" >> "$GITHUB_OUTPUT"
          echo "build_number=$build_number" >> "$GITHUB_OUTPUT"
          echo "app_version=$version_line" >> "$GITHUB_OUTPUT"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager --install "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Flutter stable
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Restore Android signing files
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_PROPERTIES_BASE64: ${{ secrets.ANDROID_KEY_PROPERTIES_BASE64 }}
        run: |
          set -euo pipefail

          mkdir -p android

          if [[ -n "${ANDROID_KEYSTORE_BASE64:-}" && -n "${ANDROID_KEY_PROPERTIES_BASE64:-}" ]]; then
            printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/bazikhone_release_key.jks
            printf '%s' "$ANDROID_KEY_PROPERTIES_BASE64" | base64 --decode > android/key.properties
          fi

          test -s android/bazikhone_release_key.jks || {
            echo "Missing Android keystore. Add ANDROID_KEYSTORE_BASE64 to GitHub Secrets." >&2
            exit 1
          }

          test -s android/key.properties || {
            echo "Missing key.properties. Add ANDROID_KEY_PROPERTIES_BASE64 to GitHub Secrets." >&2
            exit 1
          }

      - name: Generate and patch Android project
        shell: bash
        run: bash tools/prepare_android.sh

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Verify source
        shell: bash
        run: |
          set -euo pipefail
          ! grep -q "Flutter Demo Home Page" lib/main.dart
          grep -q "mk.kadkhodai.promt" android/app/build.gradle
          test -f android/app/src/main/res/drawable-nodpi/splash_screen.png

      - name: Build shared signed APK
        run: >-
          flutter build apk --release --no-shrink
          --build-name=${{ steps.version.outputs.build_name }}
          --build-number=${{ steps.version.outputs.build_number }}

      - name: Verify version and create Bazaar and Myket outputs
        shell: bash
        env:
          BUILD_NAME: ${{ steps.version.outputs.build_name }}
          BUILD_NUMBER: ${{ steps.version.outputs.build_number }}
          APP_VERSION: ${{ steps.version.outputs.app_version }}
        run: |
          set -euo pipefail

          apk="build/app/outputs/flutter-apk/app-release.apk"
          test -s "$apk"

          aapt_bin="${ANDROID_HOME}/build-tools/36.0.0/aapt"
          test -x "$aapt_bin"

          badging="$($aapt_bin dump badging "$apk")"
          echo "$badging"

          grep -q "package: name='mk.kadkhodai.promt'" <<< "$badging"
          grep -q "versionCode='${BUILD_NUMBER}'" <<< "$badging"
          grep -q "versionName='${BUILD_NAME}'" <<< "$badging"

          mkdir -p dist/bazaar dist/myket

          bazaar_apk="dist/bazaar/promptino-bazaar-v${APP_VERSION}.apk"
          myket_apk="dist/myket/promptino-myket-v${APP_VERSION}.apk"

          cp "$apk" "$bazaar_apk"
          cp "$apk" "$myket_apk"

          bazaar_sha="$(sha256sum "$bazaar_apk" | awk '{print $1}')"
          myket_sha="$(sha256sum "$myket_apk" | awk '{print $1}')"

          [[ "$bazaar_sha" == "$myket_sha" ]] || {
            echo "Market APK hashes differ; stopping." >&2
            exit 1
          }

          for store in bazaar myket; do
            cat > "dist/${store}/MARKET_VERSION.txt" <<EOF
          Store: ${store}
          Package: mk.kadkhodai.promt
          versionName: ${BUILD_NAME}
          versionCode: ${BUILD_NUMBER}
          SHA256: ${bazaar_sha}
          This APK is binary-identical to the other market output; only the file name differs.
          EOF
          done

      - name: Upload Bazaar APK
        uses: actions/upload-artifact@v4
        with:
          name: promptino-bazaar-v${{ steps.version.outputs.app_version }}
          path: dist/bazaar/
          retention-days: 7

      - name: Upload Myket APK
        uses: actions/upload-artifact@v4
        with:
          name: promptino-myket-v${{ steps.version.outputs.app_version }}
          path: dist/myket/
          retention-days: 7
