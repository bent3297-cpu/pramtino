name: Build Promptino Bazaar and Myket APKs

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find and extract Flutter ZIP
        shell: bash
        run: |
          set -euo pipefail

          rm -rf extracted_flutter app dist
          mkdir -p extracted_flutter

          python3 - <<'PY'
          from pathlib import Path
          import re
          import shutil
          import sys
          import zipfile

          def version_tuple(name: str):
              match = re.search(r"[vV]?(\d+(?:[._-]\d+)+)", name)
              if not match:
                  return (0,)
              return tuple(
                  int(part) if part.isdigit() else 0
                  for part in re.split(r"[._-]+", match.group(1))
              )

          def is_flutter_project_zip(path: Path) -> bool:
              try:
                  with zipfile.ZipFile(path, "r") as archive:
                      names = archive.namelist()
                      return (
                          any(name.endswith("pubspec.yaml") for name in names)
                          and any(name.endswith("lib/main.dart") for name in names)
                          and any(name.endswith("tools/prepare_android.sh") for name in names)
                      )
              except (zipfile.BadZipFile, OSError):
                  return False

          candidates = []
          for zip_path in Path(".").rglob("*.zip"):
              if ".git" in zip_path.parts:
                  continue
              if is_flutter_project_zip(zip_path):
                  candidates.append(
                      (
                          version_tuple(zip_path.name),
                          zip_path.stat().st_mtime,
                          zip_path,
                      )
                  )

          if not candidates:
              print("No valid Flutter source ZIP was found.")
              print("Upload promptino_flutter_*.zip to this repository, then run the workflow again.")
              sys.exit(1)

          candidates.sort(reverse=True)
          selected_zip = candidates[0][2]

          print(f"Selected Flutter ZIP: {selected_zip}")

          with zipfile.ZipFile(selected_zip, "r") as archive:
              archive.extractall("extracted_flutter")

          projects = []
          for pubspec in Path("extracted_flutter").rglob("pubspec.yaml"):
              root = pubspec.parent
              if (
                  (root / "lib" / "main.dart").is_file()
                  and (root / "tools" / "prepare_android.sh").is_file()
              ):
                  projects.append(root)

          if len(projects) != 1:
              print("Exactly one Flutter project must exist in the selected ZIP.")
              for project in projects:
                  print(project)
              sys.exit(1)

          shutil.copytree(projects[0], "app")
          print(f"Flutter project extracted to app/ from: {projects[0]}")
          PY

          test -f app/pubspec.yaml
          test -f app/lib/main.dart
          test -f app/tools/prepare_android.sh

      - name: Read shared Bazaar and Myket version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          version_line="$(grep -E '^version:' app/pubspec.yaml | head -n 1 | sed -E 's/^version:[[:space:]]*//')"
          test -n "$version_line"

          if [[ "$version_line" != *"+"* ]]; then
            echo "Version must include a numeric build code, for example 2.4.17+52." >&2
            exit 1
          fi

          build_name="${version_line%%+*}"
          build_number="${version_line##*+}"

          if ! [[ "$build_number" =~ ^[1-9][0-9]*$ ]]; then
            echo "Invalid Android versionCode: $build_number" >&2
            exit 1
          fi

          echo "build_name=$build_name" >> "$GITHUB_OUTPUT"
          echo "build_number=$build_number" >> "$GITHUB_OUTPUT"
          echo "app_version=$version_line" >> "$GITHUB_OUTPUT"

          echo "Shared versionName: $build_name"
          echo "Shared versionCode: $build_number"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Set up Flutter stable
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Restore Android signing files
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_PROPERTIES_BASE64: ${{ secrets.ANDROID_KEY_PROPERTIES_BASE64 }}
        run: |
          set -euo pipefail

          mkdir -p app/android

          if [[ -n "${ANDROID_KEYSTORE_BASE64:-}" ]]; then
            printf '%s' "$ANDROID_KEYSTORE_BASE64" \
              | base64 --decode \
              > app/android/bazikhone_release_key.jks
          fi

          if [[ -n "${ANDROID_KEY_PROPERTIES_BASE64:-}" ]]; then
            printf '%s' "$ANDROID_KEY_PROPERTIES_BASE64" \
              | base64 --decode \
              > app/android/key.properties
          fi

          test -s app/android/bazikhone_release_key.jks || {
            echo "Android keystore is missing." >&2
            exit 1
          }

          test -s app/android/key.properties || {
            echo "android/key.properties is missing." >&2
            exit 1
          }

      - name: Generate and patch Android project
        shell: bash
        run: |
          set -euo pipefail
          chmod +x app/tools/prepare_android.sh

          (
            cd app
            bash tools/prepare_android.sh
          )

      - name: Get Flutter dependencies
        working-directory: app
        run: flutter pub get

      - name: Verify release source
        shell: bash
        run: |
          set -euo pipefail

          test -f app/lib/main.dart
          test -f app/android/app/build.gradle
          test -f app/android/app/src/main/res/drawable-nodpi/splash_screen.png
          test ! -f app/android/app/build.gradle.kts

          if grep -q "Flutter Demo Home Page" app/lib/main.dart; then
            echo "Default Flutter demo source was detected." >&2
            exit 1
          fi

          grep -q "mk.kadkhodai.promt" app/android/app/build.gradle
          grep -q "jvmTarget = '17'" app/android/app/build.gradle

      - name: Build signed shared APK
        working-directory: app
        run: >-
          flutter build apk --release --no-shrink
          --build-name=${{ steps.version.outputs.build_name }}
          --build-number=${{ steps.version.outputs.build_number }}

      - name: Create Bazaar and Myket deliverables
        shell: bash
        env:
          BUILD_NAME: ${{ steps.version.outputs.build_name }}
          BUILD_NUMBER: ${{ steps.version.outputs.build_number }}
          APP_VERSION: ${{ steps.version.outputs.app_version }}
        run: |
          set -euo pipefail

          apk="app/build/app/outputs/flutter-apk/app-release.apk"

          test -s "$apk" || {
            echo "Release APK was not created." >&2
            exit 1
          }

          aapt_bin="${ANDROID_HOME}/build-tools/36.0.0/aapt"

          test -x "$aapt_bin" || {
            echo "Android aapt was not found." >&2
            exit 1
          }

          badging="$($aapt_bin dump badging "$apk")"

          echo "$badging"

          grep -q "package: name='mk.kadkhodai.promt'" <<< "$badging"
          grep -q "versionCode='${BUILD_NUMBER}'" <<< "$badging"
          grep -q "versionName='${BUILD_NAME}'" <<< "$badging"

          mkdir -p dist/bazaar dist/myket

          bazaar_apk="dist/bazaar/promptino-bazaar-v${APP_VERSION}.apk"
          myket_apk="dist/myket/promptino-myket-v${APP_VERSION}.apk"

          cp "$apk" "$bazaar_apk"
          cp "$apk" "$myket_apk"

          bazaar_sha="$(sha256sum "$bazaar_apk" | awk '{print $1}')"
          myket_sha="$(sha256sum "$myket_apk" | awk '{print $1}')"

          if [[ "$bazaar_sha" != "$myket_sha" ]]; then
            echo "Bazaar and Myket APK hashes are unexpectedly different." >&2
            exit 1
          fi

          cat > dist/bazaar/MARKET_VERSION.txt <<EOF
          Store: Cafe Bazaar
          Package: mk.kadkhodai.promt
          versionName: ${BUILD_NAME}
          versionCode: ${BUILD_NUMBER}
          SHA256: ${bazaar_sha}
          This APK is binary-identical to the Myket output; only the file name differs.
          EOF

          cat > dist/myket/MARKET_VERSION.txt <<EOF
          Store: Myket
          Package: mk.kadkhodai.promt
          versionName: ${BUILD_NAME}
          versionCode: ${BUILD_NUMBER}
          SHA256: ${myket_sha}
          This APK is binary-identical to the Bazaar output; only the file name differs.
          EOF

      - name: Upload Bazaar APK
        uses: actions/upload-artifact@v4
        with:
          name: promptino-bazaar-v${{ steps.version.outputs.app_version }}
          path: dist/bazaar/
          retention-days: 7

      - name: Upload Myket APK
        uses: actions/upload-artifact@v4
        with:
          name: promptino-myket-v${{ steps.version.outputs.app_version }}
          path: dist/myket/
          retention-days: 7
